# Third-party skills — run ./install.sh to fetch them
sources:
  - name: vercel-react-best-practices
    repo: https://github.com/vercel-labs/agent-skills.git
    path: skills/react-best-practices
    description: React and Next.js performance optimization from Vercel Engineering

  - name: web-design-guidelines
    repo: https://github.com/vercel-labs/agent-skills.git
    path: skills/web-design-guidelines
    description: 247 design heuristics for layout, color, hierarchy from Vercel

  - name: planning-with-files
    repo: https://github.com/OthmanAdi/planning-with-files.git
    path: skills/planning-with-files
    description: Persistent file-based planning — survives context loss and /clear

  - name: zustand-patterns
    repo: https://github.com/yonatangross/orchestkit
    path: skills/zustand-patterns
    description: Zustand 5.x patterns — slices, Immer, useShallow, persistence, middleware

  - name: react-native-best-practices
    repo: https://github.com/callstackincubator/agent-skills
    path: skills/react-native-best-practices
    description: React Native performance — JS, Native, Bundling optimization

